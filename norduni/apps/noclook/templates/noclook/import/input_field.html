{% if show %}
  {% if errors %}
  <div class="control-group error">
  {% endif %}
  <label for="{{name}}" class="control-label">{{label}}: </label>
  <input id="{{name}}" type="text" name="{{name}}" value="{{val}}" />
  {% if errors %}
      <div class="help-inline">{{errors}}</div>
    </div>
  {% endif %}
{% endif %}
